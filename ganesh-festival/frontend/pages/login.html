<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Ganesh Festival ECS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <span class="auth-om">ॐ</span>
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
        </div>
        <div class="auth-card-body">
            <div id="alert-container"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:1rem;" id="btn-submit">
                    🔐 Sign In
                </button>
            </form>

            <!-- Demo credentials hint -->
            <div style="margin-top:20px;padding:14px;background:#FFF8ED;border-radius:8px;border:1px solid var(--border);">
                <p style="font-size:0.8rem;font-weight:600;color:var(--text-mid);margin-bottom:8px;">🔑 Demo Credentials:</p>
                <p style="font-size:0.8rem;color:var(--text-light);">Admin: <strong>admin@ganeshfest.com</strong> / <strong>Admin@123</strong></p>
                <p style="font-size:0.8rem;color:var(--text-light);">User: <strong>priya@example.com</strong> / <strong>Admin@123</strong></p>
            </div>

            <div class="auth-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
            <div class="auth-link" style="margin-top:8px;">
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.textContent = 'Signing in...';
        btn.disabled = true;

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
            const data = await apiFetch('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });
            Auth.setSession(data.token, data.user);

            // Redirect to original page or dashboard
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect') || (data.user.role === 'admin' ? '/pages/admin.html' : '/pages/dashboard.html');
            window.location.href = redirect;
        } catch (err) {
            showAlert('alert-container', err.message, 'error');
            btn.textContent = '🔐 Sign In';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>

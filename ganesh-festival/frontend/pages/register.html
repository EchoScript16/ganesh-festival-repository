<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Ganesh Festival ECS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <span class="auth-om">ॐ</span>
            <h2>Create Account</h2>
            <p>Join the Ganesh Festival community</p>
        </div>
        <div class="auth-card-body">
            <div id="alert-container"></div>
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Your full name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="9876543210">
                    </div>
                </div>
                <div class="form-group">
                    <label>Register as</label>
                    <select id="role">
                        <option value="user">👤 General User</option>
                        <option value="volunteer">🤝 Volunteer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:1rem;" id="btn-submit">
                    🙏 Create Account
                </button>
            </form>
            <div class="auth-link">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
            <div class="auth-link" style="margin-top:8px;">
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
    if (Auth.isLoggedIn()) window.location.href = '/';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        const pass    = document.getElementById('password').value;
        const confirm = document.getElementById('confirm-password').value;

        if (pass !== confirm) {
            return showAlert('alert-container', 'Passwords do not match.', 'error');
        }

        btn.textContent = 'Creating account...';
        btn.disabled = true;

        try {
            const data = await apiFetch('/auth/register', {
                method: 'POST',
                body: JSON.stringify({
                    name:     document.getElementById('name').value.trim(),
                    email:    document.getElementById('email').value.trim(),
                    password: pass,
                    role:     document.getElementById('role').value,
                    phone:    document.getElementById('phone').value.trim()
                })
            });
            Auth.setSession(data.token, data.user);
            showAlert('alert-container', 'Account created! Redirecting...', 'success');
            setTimeout(() => window.location.href = '/pages/dashboard.html', 1200);
        } catch (err) {
            showAlert('alert-container', err.message, 'error');
            btn.textContent = '🙏 Create Account';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>

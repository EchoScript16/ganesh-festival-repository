<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandals — Ganesh Festival ECS</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .mandal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }
        .mandal-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(139,0,0,0.10);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid var(--border);
        }
        .mandal-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(139,0,0,0.20);
        }
        .mandal-img-wrap {
            position: relative;
            height: 220px;
            overflow: hidden;
            cursor: zoom-in;
            background: linear-gradient(135deg, #8B0000, #5c0000);
        }
        .mandal-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
            display: block;
        }
        .mandal-card:hover .mandal-img-wrap img { transform: scale(1.06); }
        /* Dark gradient so text over image is always readable */
        .mandal-img-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 35%, rgba(80,0,0,0.85) 100%);
            pointer-events: none;
        }
        .mandal-img-title {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 18px 18px 14px; z-index: 2; color: white;
        }
        .mandal-img-title h3 {
            font-family: 'Yatra One', cursive;
            font-size: 1.1rem; color: #ffe599;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            margin-bottom: 2px; line-height: 1.3;
        }
        .mandal-img-title .loc { font-size: 0.75rem; color: rgba(255,255,255,0.85); }
        /* Fallback icon shown when no image */
        .mandal-img-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; color: #f5c842;
        }
        .manacha-badge {
            position: absolute; top: 12px; right: 12px; z-index: 3;
            background: #f5c842; color: #5c0000;
            font-size: 0.67rem; font-weight: 800;
            padding: 4px 10px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 0.05em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .mandal-card-body { padding: 16px 18px; }
        .theme-pill {
            display: inline-flex; align-items: center; gap: 5px;
            background: #FFF0E0; color: var(--saffron);
            border: 1px solid #FFD9B0; border-radius: 20px;
            font-size: 0.73rem; font-weight: 700;
            padding: 3px 10px; margin-bottom: 10px;
        }
        .mandal-desc {
            font-size: 0.85rem; color: var(--text-mid); line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
            line-clamp: 3;
        }
        .meta-row {
            display: flex; gap: 16px; margin-top: 12px;
            padding-top: 12px; border-top: 1px solid var(--border);
        }
        .meta-item {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.78rem; color: var(--text-light);
        }
        .meta-item strong { color: var(--maroon); }
        .mandal-card-footer {
            padding: 12px 18px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; background: #FFFBF4; flex-wrap: wrap;
        }
        .modal-img-preview {
            width: 100%; height: 140px; object-fit: cover;
            border-radius: 8px; margin-bottom: 12px; display: block;
        }
        @keyframes skelpulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .skel { animation: skelpulse 1.5s infinite; background: #F0E8DC; border-radius: 16px; height: 380px; }

        /* Lightbox */
        #img-lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.93);
            z-index: 3000; display: none;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 14px;
        }
        #img-lightbox.open { display: flex; }
        #img-lightbox img {
            max-width: 90vw; max-height: 78vh;
            border-radius: 12px; object-fit: contain;
            box-shadow: 0 8px 48px rgba(0,0,0,0.6);
        }
        #img-lightbox .lb-caption {
            color: #ffe599; font-family: 'Yatra One', cursive;
            font-size: 1.1rem; text-align: center; padding: 0 20px;
        }
        #img-lightbox .lb-close {
            position: absolute; top: 20px; right: 24px;
            font-size: 2.2rem; color: white; cursor: pointer;
            background: none; border: none; opacity: 0.8; line-height: 1;
        }
        #img-lightbox .lb-close:hover { opacity: 1; }
        @media (max-width: 768px) { .mandal-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <a href="/" class="nav-brand"><span class="om">ॐ</span> Ganesh Festival ECS</a>
        <div class="nav-toggle"><span></span><span></span><span></span></div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="mandals.html" class="active">Mandals</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="donations.html">Donations</a></li>
            <li><a href="donate.html">Donate</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="contact_us.html">Contact us</a></li>
        </ul>
        <div class="nav-auth">
            <div id="nav-guest" style="display:none">
                <button class="btn-nav-login" onclick="location.href='login.html'">Login</button>
                <button class="btn-nav-register" onclick="location.href='register.html'">Register</button>
            </div>
            <div id="nav-user-info" style="display:none">
                <span id="nav-username"></span>
                <span id="nav-role" class="role-badge"></span>
                <button id="btn-logout">Logout</button>
            </div>
        </div>
    </div>
</nav>

<!-- Hero -->
<div style="background:linear-gradient(145deg,#3d0000,#6B0000,#8B0000);padding:40px 24px;text-align:center;color:white">
    <h1 style="font-family:'Yatra One',cursive;font-size:2rem;color:#ffe599;margin-bottom:8px">🏛️ Pune's Ganesh Mandals</h1>
    <p style="color:rgba(255,255,255,0.8);font-size:0.95rem">The sacred mandals that bring Ganesh Utsav to life every year</p>
</div>

<div class="page-container">
    <div class="page-header">
        <span id="mandal-count" style="font-size:0.88rem;color:var(--text-light)">Loading mandals…</span>
        <div id="admin-actions" style="display:none">
            <button class="btn btn-primary" onclick="openAddModal()">➕ Add Mandal</button>
        </div>
    </div>
    <div id="alert-container"></div>
    <div class="mandal-grid" id="mandals-list">
        <div class="skel"></div><div class="skel"></div>
        <div class="skel"></div><div class="skel"></div>
    </div>
</div>

<!-- Add / Edit Mandal Modal -->
<div class="modal-overlay" id="modal-mandal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Add New Mandal</h3>
            <button class="modal-close" onclick="closeModal('modal-mandal')">✕</button>
        </div>
        <div class="modal-body">
            <div id="modal-alert"></div>
            <input type="hidden" id="mandal-id">

            <!-- Live image preview -->
            <div id="img-preview-wrap" style="display:none">
                <img id="img-preview" src="" alt="preview" class="modal-img-preview"
                     onerror="this.parentElement.style.display='none'">
            </div>

            <div class="form-group">
                <label>Mandal Name *</label>
                <input type="text" id="mandal-name" placeholder="e.g. Kasba Ganapati Mandal">
            </div>
            <div class="form-group">
                <label>Location *</label>
                <input type="text" id="mandal-location" placeholder="e.g. Kasba Peth, Pune">
            </div>
            <div class="form-group">
                <label>Theme</label>
                <input type="text" id="mandal-theme" placeholder="e.g. Eco-Friendly, Cultural Heritage">
            </div>
            <div class="form-group">
                <label>Image Path
                    <small style="color:var(--text-light)">
                        — path inside <code>frontend/images/mandals/</code>, e.g. <code>kasaba.jpg</code>
                    </small>
                </label>
                <!-- FIX: type="text", no file upload, just the filename -->
                <input type="text" id="mandal-image"
                       placeholder="kasaba.jpg"
                       oninput="previewImg(this.value)">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="mandal-desc" rows="3" placeholder="About this mandal…"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modal-mandal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveMandal()">💾 Save Mandal</button>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div id="img-lightbox">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <img id="lb-img" src="" alt="">
    <div class="lb-caption" id="lb-cap"></div>
</div>

<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-bottom">
            <p>🪔 Ganesh Festival ECS &copy; 2026 — Ganapati Bappa Morya! 🙏</p>
        </div>
    </div>
</footer>

<script src="../js/api.js"></script>
<script>
/*
 * IMAGE PATH LOGIC
 * ─────────────────────────────────────────────────────────────────
 * Images live in:  frontend/images/mandals/kasaba.jpg  etc.
 * The server serves frontend/ as static files at root "/".
 * So the correct URL is just:  /images/mandals/kasaba.jpg
 *
 * The DB stores image_url as "/images/mandals/kasaba.jpg"
 * We use it directly — no localhost prefix needed.
 * ─────────────────────────────────────────────────────────────────
 */
function resolveImgSrc(image_url) {
    if (!image_url) return null;

    const BASE = "http://localhost:5000";

    // Full URL already
    if (image_url.startsWith('http')) return image_url;

    // If filename only
    if (!image_url.startsWith('/')) {
        return `${BASE}/images/mandals/${image_url}`;
    }

    // If path like /images/mandals/...
    return `${BASE}${image_url}`;
}

const MANACHA_RANK = {
    'kasba ganapati mandal':              '1st Manacha',
    'tambdi jogeshwari mandal':           '2nd Manacha',
    'guruji talim mandal':                '3rd Manacha',
    'tulshibaug mandal':                  '4th Manacha',
    'kesariwada':                         '5th Manacha',
};

let mandals = [];

document.addEventListener('DOMContentLoaded', async () => {
    setupNavbar();
    if (Auth.isAdmin()) document.getElementById('admin-actions').style.display = 'flex';
    await loadMandals();
});

async function loadMandals() {
    try {
        const data = await apiFetch('/mandals');
        mandals = data.mandals;
        renderMandals();
    } catch(e) {
        document.getElementById('mandals-list').innerHTML =
            `<p class="alert alert-error" style="grid-column:1/-1">Failed to load mandals: ${e.message}</p>`;
    }
}

function renderMandals() {
    const el = document.getElementById('mandals-list');
    document.getElementById('mandal-count').textContent =
        `${mandals.length} mandal${mandals.length !== 1 ? 's' : ''} registered`;

    if (!mandals.length) {
        el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">🏛️</div><p>No mandals registered yet.</p></div>`;
        return;
    }

    el.innerHTML = mandals.map(m => {
        const rank   = MANACHA_RANK[m.name.toLowerCase().trim()] || null;
        // ── FIX: use resolveImgSrc so path is always correct ──
        const imgSrc = resolveImgSrc(m.image_url);
        const desc   = (m.description || '').trim();

        // Safe strings for inline event handlers
        const safeName = m.name.replace(/'/g, "\\'");
        const safeSrc  = imgSrc ? imgSrc.replace(/'/g, "\\'") : '';

        return `
        <div class="mandal-card">

            <!-- Image area -->
            <div class="mandal-img-wrap"
                 onclick="${imgSrc ? `openLb('${safeSrc}','${safeName}')` : ''}">

                ${imgSrc ? `
                <img src="${imgSrc}"
                     alt="${m.name}"
                     loading="lazy"
                     onerror="this.style.display='none';document.getElementById('ph-${m.id}').style.display='flex'">
                ` : ''}

                <!-- Shown when image missing or fails to load -->
                <div class="mandal-img-placeholder"
                     id="ph-${m.id}"
                     style="${imgSrc ? 'display:none' : 'display:flex'}">🏛️</div>

                ${rank ? `<div class="manacha-badge">⭐ ${rank}</div>` : ''}

                <div class="mandal-img-title">
                    <h3>${m.name}</h3>
                    <div class="loc">📍 ${m.location}</div>
                </div>
            </div>

            <!-- Body -->
            <div class="mandal-card-body">
                ${m.theme ? `<div class="theme-pill">🎨 ${m.theme}</div>` : ''}
                <p class="mandal-desc">${desc || 'No description available.'}</p>
                <div class="meta-row">
                    <div class="meta-item">🎭 <strong>${m.event_count || 0}</strong>&nbsp;Events</div>
                    <div class="meta-item">👥 <strong>${m.volunteer_count || 0}</strong>&nbsp;Volunteers</div>
                </div>
            </div>

            <!-- Footer -->
            <div class="mandal-card-footer">
                <a href="events.html?mandal=${m.id}" class="btn btn-primary btn-sm">🎭 View Events</a>
                <a href="passes.html" class="btn btn-secondary btn-sm">🎟️ Darshan Pass</a>
                ${Auth.isAdmin() ? `
                    <button class="btn btn-secondary btn-sm"
                            onclick="editMandal(${m.id})"
                            style="margin-left:auto">✏️</button>
                    <button class="btn btn-danger btn-sm"
                            onclick="delMandal(${m.id},'${safeName}')">🗑️</button>
                ` : ''}
            </div>
        </div>`;
    }).join('');
}

/* ── Lightbox ── */
function openLb(src, caption) {
    document.getElementById('lb-img').src    = src;
    document.getElementById('lb-cap').textContent = caption;
    document.getElementById('img-lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeLb() {
    document.getElementById('img-lightbox').classList.remove('open');
    document.body.style.overflow = '';
}
document.getElementById('img-lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLb();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

/* ── Image preview in modal ── */
function previewImg(filename) {
    const wrap = document.getElementById('img-preview-wrap');
    const img  = document.getElementById('img-preview');
    if (filename.trim()) {
        img.src = resolveImgSrc(filename.trim());
        wrap.style.display = 'block';
    } else {
        wrap.style.display = 'none';
    }
}

/* ── Modal open ── */
function openAddModal() {
    ['mandal-id','mandal-name','mandal-location','mandal-theme','mandal-image','mandal-desc']
        .forEach(id => document.getElementById(id).value = '');
    document.getElementById('img-preview-wrap').style.display = 'none';
    document.getElementById('modal-title').textContent = 'Add New Mandal';
    document.getElementById('modal-alert').innerHTML   = '';
    openModal('modal-mandal');
}

function editMandal(id) {
    const m = mandals.find(x => x.id === id);
    if (!m) return;
    document.getElementById('mandal-id').value       = m.id;
    document.getElementById('mandal-name').value     = m.name;
    document.getElementById('mandal-location').value = m.location;
    document.getElementById('mandal-theme').value    = m.theme    || '';
    document.getElementById('mandal-image').value    = m.image_url || '';
    document.getElementById('mandal-desc').value     = m.description || '';
    document.getElementById('modal-title').textContent = 'Edit Mandal';
    document.getElementById('modal-alert').innerHTML   = '';
    previewImg(m.image_url || '');
    openModal('modal-mandal');
}

/* ── Save mandal (JSON only — no file upload) ── */
async function saveMandal() {
    const id       = document.getElementById('mandal-id').value;
    const imgInput = document.getElementById('mandal-image').value.trim();

    const body = {
        name:        document.getElementById('mandal-name').value.trim(),
        location:    document.getElementById('mandal-location').value.trim(),
        theme:       document.getElementById('mandal-theme').value.trim(),
        description: document.getElementById('mandal-desc').value.trim(),
        // Store the resolved full path in DB (e.g. /images/mandals/kasaba.jpg)
        image_url:   resolveImgSrc(imgInput) || ''
    };

    if (!body.name || !body.location) {
        return showAlert('modal-alert', 'Name and location are required.', 'error');
    }

    try {
        if (id) {
            await apiFetch(`/mandals/${id}`, { method: 'PUT',  body: JSON.stringify(body) });
            showAlert('alert-container', '✅ Mandal updated successfully!');
        } else {
            await apiFetch('/mandals',       { method: 'POST', body: JSON.stringify(body) });
            showAlert('alert-container', '✅ Mandal created successfully!');
        }
        closeModal('modal-mandal');
        await loadMandals();
    } catch(e) {
        showAlert('modal-alert', e.message, 'error');
    }
}

/* ── Delete mandal ── */
async function delMandal(id, name) {
    if (!confirm(`Delete "${name}"? All its events will also be removed.`)) return;
    try {
        await apiFetch(`/mandals/${id}`, { method: 'DELETE' });
        showAlert('alert-container', 'Mandal deleted.');
        await loadMandals();
    } catch(e) {
        showAlert('alert-container', e.message, 'error');
    }
}
</script>
</body>
</html>
